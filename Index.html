<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pawan & Mahima | Wedding Invitation</title>
  <!-- Google Fonts for luxury typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #1a0c0c 0%, #0d0308 60%, #020104 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', 'Cormorant Garamond', serif;
      overflow-x: hidden;
      position: relative;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }

    /* --- Canvas for particle effects --- */
    #particleCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* --- Main card container with 3D tilt --- */
    .card-wrapper {
      position: relative;
      z-index: 10;
      perspective: 1200px;
      width: 90%;
      max-width: 750px;
      margin: 2rem;
    }

    .card {
      background: rgba(18, 10, 10, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 2px solid rgba(212, 175, 55, 0.4);
      border-radius: 2.5rem;
      padding: 3.5rem 2.8rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(212, 175, 55, 0.25),
        0 0 80px rgba(212, 175, 55, 0.15), inset 0 0 80px rgba(212, 175, 55, 0.05);
      transform-style: preserve-3d;
      transition: transform 0.2s ease-out, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
      color: #f7e9cf;
      text-align: center;
      animation: cardEntrance 1.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    /* Entrance animation */
    @keyframes cardEntrance {
      0% {
        opacity: 0;
        transform: translateY(60px) scale(0.92);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Decorative corner flourishes */
    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border: 2px solid rgba(212, 175, 55, 0.5);
      border-radius: 2rem;
      pointer-events: none;
      z-index: 0;
      animation: cornerRotate 20s linear infinite;
    }
    .card::before {
      top: -25px;
      left: -25px;
      border-right: 0;
      border-bottom: 0;
      transform-origin: top left;
    }
    .card::after {
      bottom: -25px;
      right: -25px;
      border-left: 0;
      border-top: 0;
      transform-origin: bottom right;
    }
    @keyframes cornerRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Inner glow overlay */
    .card .inner-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      border-radius: inherit;
    }

    /* Content sits above decorative pseudo-elements */
    .card-content {
      position: relative;
      z-index: 2;
    }

    /* Ornamental divider */
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      margin: 1.8rem 0;
      color: #d4af37;
      font-size: 1.4rem;
      opacity: 0.9;
    }
    .ornament::before,
    .ornament::after {
      content: "";
      height: 2px;
      flex: 1;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
      max-width: 120px;
    }
    .ornament i {
      font-style: normal;
      filter: drop-shadow(0 0 6px gold);
    }

    /* Typography */
    .save-date {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #d4af37;
      margin-bottom: 1rem;
      font-weight: 400;
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
      animation: fadeSlideUp 1.2s ease-out 0.3s both;
    }

    .names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3.8rem, 10vw, 6rem);
      font-weight: 400;
      line-height: 1.2;
      background: linear-gradient(135deg, #f9e07b 0%, #d4af37 30%, #fef3c7 50%, #c5a028 70%, #f7d774 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
      margin: 1.2rem 0 0.5rem;
      animation: shimmerText 4s ease-in-out infinite, fadeSlideUp 1.2s ease-out 0.5s both;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

    .ampersand {
      font-family: 'Great Vibes', cursive;
      font-size: 5rem;
      display: inline-block;
      animation: heartbeat 1.6s ease-in-out infinite;
      background: linear-gradient(135deg, #f9e07b, #d4af37);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0.2rem;
      filter: drop-shadow(0 0 12px gold);
    }

    .invite-line {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-style: italic;
      color: #e5d5b0;
      letter-spacing: 0.05em;
      margin: 1rem 0 1.2rem;
      animation: fadeSlideUp 1.2s ease-out 0.7s both;
    }

    .wedding-date {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #f5e7c6;
      margin: 1.4rem 0;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
      animation: fadeSlideUp 1.2s ease-out 0.9s both;
    }

    .date-highlight {
      background: linear-gradient(to right, #d4af37, #f9e076, #d4af37);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      font-size: 2.6rem;
    }

    /* Countdown */
    .countdown-container {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin: 2.2rem 0 1.8rem;
      flex-wrap: wrap;
      animation: fadeSlideUp 1.2s ease-out 1.1s both;
    }

    .countdown-item {
      background: rgba(20, 12, 10, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(212, 175, 55, 0.5);
      border-radius: 1.4rem;
      padding: 1rem 1.2rem;
      min-width: 80px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.3);
      transition: transform 0.2s;
    }
    .countdown-number {
      font-size: 2.6rem;
      font-weight: 700;
      color: #f7e382;
      font-family: 'Playfair Display', serif;
      line-height: 1;
      text-shadow: 0 0 12px #d4af37;
      display: block;
    }
    .countdown-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #c9b37e;
      margin-top: 0.3rem;
    }

    .closing-text {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.6rem;
      color: #dac292;
      margin-top: 1.5rem;
      animation: fadeSlideUp 1.2s ease-out 1.3s both;
    }

    @keyframes shimmerText {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      15% { transform: scale(1.25); }
      30% { transform: scale(1); }
      45% { transform: scale(1.15); }
      60% { transform: scale(1); }
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Responsive adjustments */
    @media (max-width: 550px) {
      .card {
        padding: 2.2rem 1.2rem;
        border-radius: 2rem;
      }
      .names {
        font-size: 3.2rem;
      }
      .countdown-container {
        gap: 0.5rem;
      }
      .countdown-item {
        min-width: 65px;
        padding: 0.7rem 0.6rem;
      }
      .countdown-number {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Particle canvas for luxury animated background -->
  <canvas id="particleCanvas"></canvas>

  <!-- 3D tilt card wrapper -->
  <div class="card-wrapper" id="cardWrapper">
    <div class="card" id="weddingCard">
      <div class="inner-glow"></div>
      <div class="card-content">
        <div class="save-date">Save the Date</div>
        <div class="names">
          Pawan <span class="ampersand">&</span> Mahima
        </div>
        <div class="ornament">
          <i>✧</i> <i>✦</i> <i>✧</i>
        </div>
        <div class="invite-line">joyfully invite you to celebrate their union</div>
        <div class="wedding-date">
          <span class="date-highlight">21 & 22</span><br>
          December 2026
        </div>
        <div class="countdown-container" id="countdown">
          <div class="countdown-item">
            <span class="countdown-number" id="days">00</span>
            <span class="countdown-label">Days</span>
          </div>
          <div class="countdown-item">
            <span class="countdown-number" id="hours">00</span>
            <span class="countdown-label">Hours</span>
          </div>
          <div class="countdown-item">
            <span class="countdown-number" id="minutes">00</span>
            <span class="countdown-label">Minutes</span>
          </div>
          <div class="countdown-item">
            <span class="countdown-number" id="seconds">00</span>
            <span class="countdown-label">Seconds</span>
          </div>
        </div>
        <div class="closing-text">With love & blessings</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ----- LUXURY PARTICLE SYSTEM (Canvas) -----
      const canvas = document.getElementById('particleCanvas');
      const ctx = canvas.getContext('2d');
      let width, height;
      let particles = [];

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // Particle class – elegant gold sparkles and floating light motes
      class Particle {
        constructor() {
          this.reset();
          // start at random vertical position to populate canvas immediately
          this.y = Math.random() * height;
        }
        reset() {
          this.x = Math.random() * width;
          this.y = height + Math.random() * 100;
          this.size = Math.random() * 3.5 + 1.2;
          this.speedY = -(Math.random() * 0.7 + 0.3); // float upward
          this.speedX = (Math.random() - 0.5) * 0.4;
          this.opacity = Math.random() * 0.7 + 0.3;
          this.golden = Math.random() > 0.3; // most particles gold, some rose/white
          this.colorType = Math.random();
          this.rotation = Math.random() * Math.PI * 2;
          this.rotationSpeed = (Math.random() - 0.5) * 0.02;
          this.fadeIn = true;
          this.life = 1;
        }
        update() {
          this.y += this.speedY;
          this.x += this.speedX;
          this.rotation += this.rotationSpeed;

          // Reset when off top or faded
          if (this.y < -20 || this.life <= 0.02) {
            this.reset();
            this.y = height + 20;
            this.life = 1;
            this.fadeIn = true;
          }

          // Fade in near bottom, fade out near top
          if (this.y > height - 80 && this.fadeIn) {
            this.life = Math.min(1, (height - this.y) / 80);
          } else if (this.y < 120) {
            this.life = Math.max(0, this.y / 120);
            this.fadeIn = false;
          } else {
            this.life = 1;
          }
        }
        draw(ctx) {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          const alpha = this.opacity * this.life;
          // Choose color palette
          let color;
          if (this.colorType < 0.6) {
            // gold
            color = `rgba(245, 210, 110, ${alpha})`;
          } else if (this.colorType < 0.85) {
            // rose gold
            color = `rgba(232, 180, 150, ${alpha})`;
          } else {
            // soft white sparkle
            color = `rgba(255, 245, 230, ${alpha})`;
          }

          // Draw a 4-point star shape for luxury sparkle
          ctx.beginPath();
          const s = this.size;
          ctx.moveTo(0, -s);
          ctx.lineTo(s * 0.35, -s * 0.35);
          ctx.lineTo(s, 0);
          ctx.lineTo(s * 0.35, s * 0.35);
          ctx.lineTo(0, s);
          ctx.lineTo(-s * 0.35, s * 0.35);
          ctx.lineTo(-s, 0);
          ctx.lineTo(-s * 0.35, -s * 0.35);
          ctx.closePath();
          ctx.fillStyle = color;
          ctx.shadowColor = color;
          ctx.shadowBlur = 6;
          ctx.fill();
          ctx.restore();
        }
      }

      // Initialize particles
      const PARTICLE_COUNT = 130;
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        particles.push(new Particle());
      }

      function animateParticles() {
        ctx.clearRect(0, 0, width, height);
        particles.forEach(p => {
          p.update();
          p.draw(ctx);
        });
        requestAnimationFrame(animateParticles);
      }
      animateParticles();

      // ----- COUNTDOWN TIMER to December 21, 2026, 10:00 AM -----
      const weddingDate = new Date(2026, 11, 21, 10, 0, 0); // month 11 = December
      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');

      function updateCountdown() {
        const now = new Date();
        const diff = weddingDate - now;

        if (diff <= 0) {
          daysEl.textContent = '00';
          hoursEl.textContent = '00';
          minutesEl.textContent = '00';
          secondsEl.textContent = '00';
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        // Animate scale on digit change
        animateDigit(daysEl, days);
        animateDigit(hoursEl, hours);
        animateDigit(minutesEl, minutes);
        animateDigit(secondsEl, seconds);
      }

      function animateDigit(element, value) {
        const strValue = value < 10 ? '0' + value : '' + value;
        if (element.textContent !== strValue) {
          element.style.transform = 'scale(1.3)';
          element.style.transition = 'transform 0.15s ease-out';
          element.textContent = strValue;
          setTimeout(() => {
            element.style.transform = 'scale(1)';
          }, 150);
        }
      }

      updateCountdown();
      setInterval(updateCountdown, 1000);

      // ----- 3D TILT EFFECT on mouse move (luxury interactive) -----
      const cardWrapper = document.getElementById('cardWrapper');
      const card = document.getElementById('weddingCard');

      function handleMouseMove(e) {
        const rect = cardWrapper.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const mouseX = e.clientX - centerX;
        const mouseY = e.clientY - centerY;

        const maxRotate = 8; // degrees
        const rotateY = (mouseX / (rect.width / 2)) * maxRotate;
        const rotateX = -(mouseY / (rect.height / 2)) * maxRotate;

        card.style.transform = `perspective(1200px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
        card.style.boxShadow = `
          0 30px 60px rgba(0, 0, 0, 0.8),
          0 0 0 1px rgba(212, 175, 55, 0.4),
          0 0 120px rgba(212, 175, 55, 0.2),
          inset 0 0 80px rgba(212, 175, 55, 0.08)
        `;
      }

      function handleMouseLeave() {
        card.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg) translateZ(0)';
        card.style.boxShadow = `
          0 30px 60px rgba(0, 0, 0, 0.7),
          0 0 0 1px rgba(212, 175, 55, 0.25),
          0 0 80px rgba(212, 175, 55, 0.15),
          inset 0 0 80px rgba(212, 175, 55, 0.05)
        `;
      }

      cardWrapper.addEventListener('mousemove', handleMouseMove);
      cardWrapper.addEventListener('mouseleave', handleMouseLeave);

      // Touch devices: disable tilt to prevent awkwardness
      if ('ontouchstart' in window) {
        cardWrapper.removeEventListener('mousemove', handleMouseMove);
        cardWrapper.removeEventListener('mouseleave', handleMouseLeave);
      }

      // Handle window resize for canvas particles count dynamic? already fine.
    })();
  </script>
</body>
</html>
